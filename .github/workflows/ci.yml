name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Instantiate project
        run: julia --startup-file=no --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --startup-file=no --project=. test/runtests.jl
